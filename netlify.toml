# Netlify hosts the frontend + light server functions (enqueue only — no Chrome/Selenium).
# Selenium runs on the Raspberry Pi via `npm run worker`.

[build]
  command = "npm run build"
  publish = "dist"
  # TanStack Start + Nitro netlify preset emits browser assets to dist
  # and server functions to .netlify/functions-internal.

[build.environment]
  NODE_VERSION = "20"
  NITRO_PRESET = "netlify"

# Optional: hit this from Netlify Scheduled Functions / external cron at 8 AM IST
# Headers: x-cron-secret: <CRON_SECRET>
# /api/cron/daily-refresh — only enqueues jobs into Supabase
