<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Signing you in…</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        color: #334;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <p id="msg">Signing you in…</p>
    <script>
      (function () {
        var STORAGE_KEY = "dailyresume.google_oauth_result";

        function show(text) {
          var el = document.getElementById("msg");
          if (el) el.textContent = text;
        }

        try {
          var raw = window.location.hash
            ? window.location.hash.substring(1)
            : window.location.search.substring(1);
          var params = new URLSearchParams(raw);
          var id_token = params.get("id_token");
          var error = params.get("error");

          var returnTo = "/login?oauth=1";
          try {
            returnTo = sessionStorage.getItem("dailyresume.oauth_return") || returnTo;
          } catch (_) {}

          if (error) {
            try {
              localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify({
                  type: "oauth2",
                  error: error,
                  error_description: params.get("error_description") || "",
                  ts: Date.now(),
                }),
              );
            } catch (_) {}
            show("Sign-in was cancelled or denied. Redirecting…");
            setTimeout(function () {
              window.location.replace(returnTo);
            }, 400);
            return;
          }

          if (!id_token) {
            show("No id_token in callback URL. Check Google OAuth redirect URI settings.");
            return;
          }

          try {
            localStorage.setItem(
              STORAGE_KEY,
              JSON.stringify({ type: "oauth2", id_token: id_token, ts: Date.now() }),
            );
          } catch (_) {}

          try {
            history.replaceState({}, document.title, window.location.pathname);
          } catch (_) {}

          show("Signed in. Redirecting…");
          setTimeout(function () {
            window.location.replace(returnTo);
          }, 150);
        } catch (e) {
          show("Callback error: " + (e && e.message ? e.message : e));
        }
      })();
    </script>
  </body>
</html>
